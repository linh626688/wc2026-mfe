name: Deploy host-app

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/host-app/**"
      - "packages/**"
  pull_request:
    paths:
      - "apps/host-app/**"
      - "packages/**"

jobs:
  contract-test:
    name: Contract Test (Host side)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
      - run: yarn install --frozen-lockfile
      - run: npx tsc --noEmit -p apps/host-app/tsconfig.app.json

  deploy:
    name: Deploy Host to Vercel
    needs: contract-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build host-app with production env vars
        run: yarn turbo run build --filter=host-app
        env:
          VITE_REMOTE_MATCHES_URL: ${{ secrets.PROD_REMOTE_MATCHES_URL }}
          VITE_REMOTE_LIVE_URL: ${{ secrets.PROD_REMOTE_LIVE_URL }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_HOST }}
          working-directory: ./apps/host-app
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
