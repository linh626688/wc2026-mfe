name: Deploy remote-matches

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/remote-matches/**"
      - "packages/types/**"
      - "packages/shared-state/**"
  pull_request:
    paths:
      - "apps/remote-matches/**"
      - "packages/types/**"
      - "packages/shared-state/**"

jobs:
  contract-test:
    name: Contract Test (TypeScript Check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: TypeScript compile check
        run: yarn turbo run build --filter=@worldcup/types && npx tsc --noEmit -p apps/remote-matches/tsconfig.app.json

  deploy:
    name: Deploy to Vercel
    needs: contract-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_REMOTE_MATCHES }}
          # PHẢI LÀ GỐC để gửi kèm các thư mục packages/ sang Vercel
          working-directory: .
          # Chỉ định config nằm sâu bên trong
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --local-config ./apps/remote-matches/vercel.json
